<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LibraryOS — College Library System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --cream: #ede7d5;
    --gold: #c9923a;
    --gold-light: #e8b86d;
    --rust: #8b3a1a;
    --forest: #1e3a2f;
    --sage: #4a7c59;
    --muted: #7a6e5f;
    --white: #fff9f0;
    --shadow: rgba(26,18,8,0.12);
    --card-bg: #fffdf7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ─── SIDEBAR NAV ─── */
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 240px;
    background: var(--forest);
    display: flex;
    flex-direction: column;
    z-index: 100;
    transition: transform 0.3s ease;
  }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-logo .logo-icon {
    font-size: 28px;
    margin-bottom: 6px;
  }

  .sidebar-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold-light);
    font-weight: 700;
    line-height: 1.2;
  }

  .sidebar-logo p {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .nav-section {
    padding: 20px 14px 10px;
  }

  .nav-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    padding: 0 10px;
    margin-bottom: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
    text-decoration: none;
  }

  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: var(--gold); color: var(--forest); font-weight: 600; }
  .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; }

  .sidebar-footer {
    margin-top: auto;
    padding: 20px 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--forest);
    flex-shrink: 0;
  }

  .user-info p { font-size: 13px; color: #fff; font-weight: 500; }
  .user-info span { font-size: 11px; color: rgba(255,255,255,0.4); }

  /* ─── MAIN CONTENT ─── */
  .main {
    margin-left: 240px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid rgba(26,18,8,0.08);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }

  .hamburger span {
    display: block;
    width: 22px; height: 2px;
    background: var(--ink);
    border-radius: 2px;
    transition: all 0.3s;
  }

  .search-bar {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    border: 1.5px solid rgba(26,18,8,0.12);
    border-radius: 12px;
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    transition: border-color 0.2s;
    outline: none;
  }

  .search-bar input:focus { border-color: var(--gold); }
  .search-bar .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--muted);
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .notif-btn {
    position: relative;
    background: none;
    border: 1.5px solid rgba(26,18,8,0.12);
    border-radius: 10px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
  }

  .notif-btn:hover { border-color: var(--gold); background: var(--cream); }

  .notif-dot {
    position: absolute;
    top: 8px; right: 9px;
    width: 7px; height: 7px;
    background: var(--rust);
    border-radius: 50%;
    border: 1.5px solid var(--white);
  }

  /* ─── PAGE CONTENT ─── */
  .page { display: none; padding: 32px; }
  .page.active { display: block; }

  /* ─── HOME PAGE ─── */
  .welcome-banner {
    background: linear-gradient(135deg, var(--forest) 0%, #2d5a43 100%);
    border-radius: 20px;
    padding: 36px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .welcome-banner::before {
    content: '📚';
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 90px;
    opacity: 0.15;
  }

  .welcome-banner h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #fff;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .welcome-banner p {
    color: rgba(255,255,255,0.65);
    font-size: 14px;
  }

  .banner-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--forest);
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }

  .btn-outline {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-outline:hover { background: rgba(255,255,255,0.18); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid rgba(26,18,8,0.07);
    border-radius: 16px;
    padding: 20px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow); }

  .stat-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }

  .stat-icon.green { background: #e8f5ec; }
  .stat-icon.gold { background: #fdf3e3; }
  .stat-icon.rust { background: #fdecea; }
  .stat-icon.blue { background: #e8f0fe; }

  .stat-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .stat-card p { font-size: 12px; color: var(--muted); }

  /* SECTION TITLE */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }

  .see-all {
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border: none;
    background: none;
    padding: 0;
  }

  /* BOOKS GRID */
  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 18px;
    margin-bottom: 32px;
  }

  .book-card {
    background: var(--card-bg);
    border: 1px solid rgba(26,18,8,0.07);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .book-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px var(--shadow); }

  .book-cover {
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
  }

  .book-badge {
    position: absolute;
    top: 10px; right: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-available { background: #d4edda; color: #155724; }
  .badge-issued { background: #fdecea; color: #7f1d1d; }
  .badge-reserved { background: #fff3cd; color: #7d4e00; }

  .book-info { padding: 12px 14px; }

  .book-info h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .book-info p {
    font-size: 11px;
    color: var(--muted);
  }

  /* ALERTS / NOTIFICATIONS */
  .alerts-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .alert-item {
    background: var(--card-bg);
    border: 1px solid rgba(26,18,8,0.07);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-left: 4px solid;
  }

  .alert-item.warning { border-left-color: #f59e0b; }
  .alert-item.danger { border-left-color: var(--rust); }
  .alert-item.info { border-left-color: var(--sage); }

  .alert-icon { font-size: 20px; }

  .alert-text p { font-size: 13px; font-weight: 500; color: var(--ink); }
  .alert-text span { font-size: 12px; color: var(--muted); }

  /* ─── SEARCH/CATALOG PAGE ─── */
  .filter-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .filter-chip {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1.5px solid rgba(26,18,8,0.15);
    background: var(--card-bg);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--ink);
  }

  .filter-chip:hover, .filter-chip.active {
    background: var(--forest);
    color: #fff;
    border-color: var(--forest);
  }

  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .catalog-card {
    background: var(--card-bg);
    border: 1px solid rgba(26,18,8,0.07);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .catalog-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow); }

  .catalog-cover {
    width: 60px; height: 80px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
  }

  .catalog-info { flex: 1; min-width: 0; }
  .catalog-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 3px; color: var(--ink); }
  .catalog-info .author { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

  .catalog-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .dept-tag {
    background: var(--cream);
    color: var(--muted);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .avail-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--sage);
  }

  .avail-count.zero { color: var(--rust); }

  .reserve-btn {
    margin-top: 10px;
    background: var(--forest);
    color: #fff;
    border: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reserve-btn:hover { background: var(--sage); }

  /* ─── MY BOOKS PAGE ─── */
  .my-books-tabs {
    display: flex;
    gap: 4px;
    background: var(--cream);
    padding: 4px;
    border-radius: 12px;
    width: fit-content;
    margin-bottom: 24px;
  }

  .tab-btn {
    padding: 9px 20px;
    border-radius: 9px;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--card-bg);
    color: var(--ink);
    font-weight: 600;
    box-shadow: 0 1px 4px var(--shadow);
  }

  .issued-table {
    background: var(--card-bg);
    border: 1px solid rgba(26,18,8,0.07);
    border-radius: 16px;
    overflow: hidden;
  }

  .table-head {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 100px;
    padding: 12px 20px;
    background: var(--cream);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .table-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 100px;
    padding: 16px 20px;
    border-top: 1px solid rgba(26,18,8,0.06);
    align-items: center;
    transition: background 0.15s;
  }

  .table-row:hover { background: var(--paper); }

  .table-row .book-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .table-row .book-name span { display: block; font-size: 11px; color: var(--muted); font-weight: 400; }
  .table-row .cell { font-size: 13px; color: var(--muted); }

  .due-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }

  .due-ok { background: #d4edda; color: #155724; }
  .due-soon { background: #fff3cd; color: #7d4e00; }
  .due-overdue { background: #fdecea; color: #7f1d1d; }

  /* ─── NOTIFICATIONS PAGE ─── */
  .notif-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .notif-card {
    background: var(--card-bg);
    border: 1px solid rgba(26,18,8,0.07);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    gap: 16px;
    transition: all 0.2s;
    border-left: 4px solid transparent;
  }

  .notif-card:hover { box-shadow: 0 4px 16px var(--shadow); }
  .notif-card.unread { border-left-color: var(--gold); background: #fffcf5; }

  .notif-icon-box {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .notif-card .notif-body { flex: 1; }
  .notif-card .notif-body p { font-size: 14px; color: var(--ink); line-height: 1.5; }
  .notif-card .notif-body span { font-size: 12px; color: var(--muted); margin-top: 4px; display: block; }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 24px;
  }

  /* ─── HISTORY TABLE ─── */
  .history-table {
    background: var(--card-bg);
    border: 1px solid rgba(26,18,8,0.07);
    border-radius: 16px;
    overflow: hidden;
  }

  .history-head {
    display: grid;
    grid-template-columns: 2.5fr 1fr 1fr 1fr;
    padding: 12px 20px;
    background: var(--cream);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .history-row {
    display: grid;
    grid-template-columns: 2.5fr 1fr 1fr 1fr;
    padding: 14px 20px;
    border-top: 1px solid rgba(26,18,8,0.06);
    align-items: center;
    transition: background 0.15s;
  }

  .history-row:hover { background: var(--paper); }
  .history-row .book-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .history-row .book-name span { font-size: 11px; color: var(--muted); font-weight: 400; display: block; }
  .history-row .cell { font-size: 13px; color: var(--muted); }

  .returned-badge {
    display: inline-block;
    padding: 4px 10px;
    background: #d4edda;
    color: #155724;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }

  /* ─── SEAT BOOKING PAGE ─── */
  .seats-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    max-width: 500px;
    margin-bottom: 24px;
  }

  .seat {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
    font-size: 12px;
  }

  .seat.free {
    background: #e8f5ec;
    border-color: #4a7c59;
    color: #1e3a2f;
  }

  .seat.taken {
    background: var(--cream);
    border-color: rgba(26,18,8,0.12);
    color: var(--muted);
    cursor: not-allowed;
  }

  .seat.selected {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--forest);
  }

  .seat.free:hover:not(.selected) {
    background: #d4edda;
    transform: scale(1.05);
  }

  .seat-legend {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 4px;
    border: 2px solid;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    padding: 32px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 24px 60px rgba(26,18,8,0.25);
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .modal-book-cover {
    width: 80px; height: 100px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    margin-bottom: 16px;
  }

  .modal-detail { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  .modal-detail strong { color: var(--ink); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-close {
    background: var(--cream);
    color: var(--ink);
    border: none;
    padding: 11px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    flex: 1;
  }

  .btn-reserve {
    background: var(--forest);
    color: #fff;
    border: none;
    padding: 11px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    flex: 1;
    transition: all 0.2s;
  }

  .btn-reserve:hover { background: var(--sage); }

  /* ─── MOBILE OVERLAY ─── */
  .mobile-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
  }
